      - name: Épica - Seguridad (Firestore Rules)
        run: |
          TITLE="Épica: Seguridad (Firestore Rules)"
          EXISTS=$(gh issue list --repo "$REPO" --search "Seguridad" --json title --jq '.[].title' | grep -F "Seguridad" || true)
          if [ -z "$EXISTS" ]; then
            gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --label "enhancement" \
              --body "## Contexto
          Implementación y validación de reglas de seguridad en Firestore para garantizar que cada usuario solo pueda acceder y modificar los datos que le corresponden según su rol. Incluye validaciones de datos, control de acceso granular y auditoría.

          ## User Story
          Como propietario del sistema, quiero que las reglas de Firestore protejan los datos de cada usuario y negocio, para que ningún actor malicioso pueda acceder o modificar información que no le pertenece.

          ## Criterios de aceptación
          **Flujo normal:**
          - Given un cliente autenticado, When intenta leer datos de sus propias citas, Then tiene acceso. When intenta leer citas de otro cliente, Then se deniega el acceso.
          - Given un propietario autenticado, When gestiona su negocio, Then puede leer/escribir todos los datos de su negocio. When intenta acceder a datos de otro negocio, Then se deniega.
          - Given staff autenticado, When accede a las citas de su negocio, Then puede verlas. When intenta modificar datos fuera de su negocio, Then se deniega.
          - Given datos inválidos, When se intenta guardar en Firestore, Then las reglas de validación rechazan el documento.

          **Errores:**
          - When un token de autenticación expirado hace una petición, Then Firestore deniega el acceso con error de autenticación.
          - When se intenta inyectar campos no permitidos, Then las reglas de validación los rechazan.

          **Casos relevantes:**
          - Usuario con rol múltiple (staff de varios negocios).
          - Cambio de rol en tiempo real.

          ## Tareas técnicas
          **Firestore Rules:**
          - Reglas para colección users: solo el propio usuario puede leer/editar su perfil.
          - Reglas para colección businesses: propietario puede gestionar, público puede leer datos básicos.
          - Reglas para colección appointments: cliente ve sus citas, staff/owner ve citas de su negocio.
          - Reglas para colección services: propietario gestiona, clientes solo lectura.
          - Reglas para colección staff: propietario gestiona su staff, staff ve su propio perfil.
          - Reglas para colección reviews: cliente crea su propia reseña, todos pueden leer.
          - Validaciones de tipos de datos (string, number, timestamp, etc.).
          - Validaciones de campos obligatorios y rangos permitidos.

          **Cloud Functions:**
          - Uso de custom claims para verificación de roles en reglas.
          - Función para asignar/revocar roles (no en cliente).

          **Firebase:**
          - Firebase App Check para verificar que las peticiones vienen de la app real.
          - Configuración de reglas en entornos dev/staging/prod separados.
          - Tests automáticos de Firestore Rules con Firebase Emulator.

          ## Consideraciones técnicas
          - Las reglas de Firestore son la última línea de defensa: deben ser exhaustivas.
          - Nunca confiar solo en la validación del cliente (Flutter).
          - Usar custom claims de Firebase Auth para roles (no datos de Firestore en reglas críticas).
          - Documentar cada regla con su justificación de seguridad.
          - Revisar reglas en cada release con pruebas de penetración básicas.

          ## Edge cases
          - Usuario con token válido pero cuyo negocio fue eliminado.
          - Staff revocado intenta acceder con token aún válido.
          - Ataque de enumeración de IDs de documentos.
          - Petición con payload extremadamente grande (DoS).
          - Cambio en estructura de custom claims sin migración de tokens.

          ## Prioridad
          Alta

          ## Tipo
          Security"
            echo "✅ Issue creado: $TITLE"
          else
            echo "⏭️  Ya existe: $TITLE"
          fi

      - name: Épica - Manejo offline y sincronización
        run: |
          TITLE="Épica: Manejo offline y sincronización"
          EXISTS=$(gh issue list --repo "$REPO" --search "$TITLE" --json title --jq '.[].title' | grep -F "$TITLE" || true)
          if [ -z "$EXISTS" ]; then
            gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --label "enhancement" \
              --body "## Contexto
          Implementación de funcionalidad offline-first que permite a los usuarios utilizar las funcionalidades principales de la app sin conexión a internet, sincronizando automáticamente cuando la conectividad se restaura. Crítico para usuarios en zonas con conectividad intermitente.

          ## User Story
          Como cliente, quiero poder ver mis citas y el catálogo de servicios aunque no tenga internet, para no depender de la conectividad para acceder a información que ya cargué anteriormente.

          ## Criterios de aceptación
          **Flujo normal:**
          - Given un cliente que usó la app con internet, When pierde conectividad, Then puede ver sus citas próximas, historial y catálogo de negocios visitados.
          - Given la app sin internet, When el usuario realiza una acción que requiere conexión (nueva reserva), Then se le informa claramente que necesita conectividad y se guarda como borrador.
          - Given conectividad restaurada, When hay datos pendientes de sincronizar, Then la app sincroniza automáticamente en background sin intervención del usuario.
          - Given un conflicto de datos (mismos datos modificados offline y en servidor), When se sincroniza, Then se aplica una estrategia de resolución clara (last-write-wins o merge).

          **Errores:**
          - When la sincronización falla parcialmente, Then se reintenta solo la parte fallida, no todo.
          - When los datos locales están corruptos, Then se recupera desde el servidor sin pérdida de datos críticos.

          **Casos relevantes:**
          - Usuario con muy poco almacenamiento local.
          - Sincronización de grandes cantidades de datos al volver a conectarse.

          ## Tareas técnicas
          **Flutter:**
          - Activar persistencia offline de Firestore SDK.
          - Almacenamiento local adicional con Hive o Isar para datos no sincronizados.
          - Indicador visual de estado de conexión en UI (banner/snackbar).
          - Cola de operaciones pendientes cuando está offline.
          - Gestión de conflictos de sincronización con diálogos de resolución.

          **Firestore:**
          - Habilitar persistencia offline en Firestore SDK.
          - Queries optimizados para funcionar con caché local.
          - Uso de Source.cache y Source.server según disponibilidad.
          - Límites de caché local (evitar llenar almacenamiento del dispositivo).

          **Cloud Functions:**
          - Endpoint de sincronización incremental (delta sync) para reducir transferencia.
          - Resolución de conflictos en servidor para datos críticos (citas).
          - Logs de sincronización para auditoría y debugging.

          **Firebase:**
          - Configuración de tamaño máximo de caché de Firestore.
          - Background sync con WorkManager (Android) / BGTaskScheduler (iOS).

          ## Consideraciones técnicas
          - Diseñar el modelo de datos con offline-first en mente desde el principio.
          - Priorizar datos críticos (citas próximas) sobre datos secundarios (historial antiguo).
          - Informar siempre al usuario del estado de sus datos (sincronizado/pendiente/error).
          - Probar en condiciones de red degradada (throttling, pérdida intermitente).
          - Manejar el límite de almacenamiento del dispositivo.

          ## Edge cases
          - Usuario elimina la app offline con datos sin sincronizar.
          - Dos dispositivos del mismo usuario hacen cambios offline.
          - Cita reservada offline que ya no está disponible al sincronizar.
          - Actualización de la app mientras hay datos offline pendientes.
          - Dispositivo con muy poco espacio de almacenamiento.

          ## Prioridad
          Media

          ## Tipo
          Mobile"
